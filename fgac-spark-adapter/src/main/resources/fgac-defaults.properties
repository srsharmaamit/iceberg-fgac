# ============================================================
#  FGAC framework ? default configuration properties
#  Override in: fgac.properties, env vars, or system properties
#
#  Priority (highest first):
#    1. System properties (-Dfgac.*)
#    2. Environment variables (FGAC_* with . ? _)
#    3. File at fgac.config.path
#    4. This file (classpath defaults)
# ============================================================

# --- Nessie catalog ---
fgac.nessie.uri=http://nessie:19120/api/v1
fgac.nessie.ref=main
fgac.nessie.warehouse=s3a://warehouse/
fgac.nessie.catalog.name=nessie
fgac.nessie.auth.type=NONE

# --- S3A / MinIO ---
fgac.s3a.endpoint=http://minio:9000
fgac.s3a.access.key=minioadmin
fgac.s3a.secret.key=minioadmin
fgac.s3a.path.style.access=true

# --- Policy cache ---
fgac.policy.cache.ttl-minutes=5
fgac.policy.cache.max-size=10000

# --- Policy seed ---
fgac.policy.seed.path=classpath:/config/policies/seed-policies.json

# --- Audit emitter ---
fgac.audit.queue-capacity=10000
fgac.audit.batch-size=200
fgac.audit.flush-interval-seconds=10
fgac.audit.table.namespace=audit
fgac.audit.table.name=query_log

# --- Audit retention ---
fgac.audit.retention.days=2555

# --- Identity ---
fgac.identity.spark.conf-key=spark.app.current_user
fgac.identity.deny-on-unknown=true